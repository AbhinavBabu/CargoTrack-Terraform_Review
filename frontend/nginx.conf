# nginx.conf — CargoTrack Frontend
#
# BACKEND_URL is substituted at container startup via envsubst.
# Set the BACKEND_URL environment variable to point to your backend:
#   Same-host (same docker network): http://backend:4000
#   Separate EC2:                    http://10.0.1.5:4000
#   Internal DNS:                    http://cargotrack-api.internal:4000
#
# nginx variables ($host, $http_upgrade, etc.) are NOT substituted
# because we only pass $BACKEND_URL to envsubst.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Forward real client IP from ALB/CloudFront
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # API reverse proxy — routes /api/* to backend tier
    location /api/ {
        proxy_pass $BACKEND_URL/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 10M;
    }

    # File uploads proxy
    location /uploads/ {
        proxy_pass $BACKEND_URL/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA catch-all — React Router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite adds content hashes to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint for load balancers
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
